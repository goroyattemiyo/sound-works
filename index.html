<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOUND WORKS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a12;
      --panel: #121525;
      --text: #f7f4df;
      --muted: #a7afc2;
      --cyan: #30f2ff;
      --pink: #ff3fb4;
      --yellow: #ffe066;
      --line: rgba(48, 242, 255, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(48, 242, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 63, 180, 0.04) 1px, transparent 1px),
        radial-gradient(circle at 50% 10%, rgba(48, 242, 255, 0.18), transparent 32rem),
        var(--bg);
      background-size: 24px 24px, 24px 24px, auto, auto;
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      overflow: hidden;
      position: relative;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035),
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 5px
      );
      mix-blend-mode: screen;
    }

    .hero {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 32px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      padding: 28px 0;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--cyan);
      font-size: 0.88rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(3rem, 9vw, 6.8rem);
      line-height: 0.9;
      text-shadow:
        4px 0 0 rgba(255, 63, 180, 0.8),
        -4px 0 0 rgba(48, 242, 255, 0.65),
        0 6px 0 #000;
    }

    .description {
      max-width: 620px;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .start-button {
      border: 2px solid var(--cyan);
      background: #101827;
      color: var(--text);
      min-height: 52px;
      padding: 0 28px;
      font: 700 1rem/1 "Courier New", Courier, monospace;
      cursor: pointer;
      box-shadow:
        0 0 0 2px #000,
        6px 6px 0 var(--pink),
        0 0 26px rgba(48, 242, 255, 0.28);
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .start-button:hover,
    .start-button:focus-visible {
      background: #17263d;
      transform: translate(-2px, -2px);
      box-shadow:
        0 0 0 2px #000,
        8px 8px 0 var(--pink),
        0 0 34px rgba(48, 242, 255, 0.42);
      outline: none;
    }

    .start-button:active,
    .start-button.is-pressed {
      transform: translate(3px, 3px);
      box-shadow:
        0 0 0 2px #000,
        2px 2px 0 var(--pink),
        0 0 18px rgba(48, 242, 255, 0.2);
    }

    .status {
      color: var(--yellow);
      min-height: 1.4em;
      font-size: 0.92rem;
    }

    .song-panel {
      margin-top: 28px;
      max-width: 620px;
      padding: 16px;
      border: 1px solid var(--line);
      background: rgba(18, 21, 37, 0.82);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .song-panel-title {
      margin: 0 0 12px;
      color: var(--cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .song-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .song-item-button {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(48, 242, 255, 0.24);
      background: rgba(9, 10, 18, 0.72);
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .song-item-button:hover,
    .song-item-button:focus-visible {
      background: rgba(23, 38, 61, 0.92);
      border-color: var(--cyan);
      transform: translateY(-1px);
      outline: none;
    }

    .song-item-button.is-selected {
      border-color: var(--pink);
      background: rgba(255, 63, 180, 0.16);
      color: var(--yellow);
      box-shadow: inset 0 0 0 1px rgba(255, 63, 180, 0.38);
    }

    .song-list-status {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .song-current {
      margin: 0 0 12px;
      color: var(--yellow);
      font-size: 0.92rem;
    }

    .song-meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .song-item-title {
      display: block;
      color: inherit;
    }

    .song-item-bpm {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .start-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      box-shadow:
        0 0 0 2px #000,
        3px 3px 0 rgba(255, 63, 180, 0.28);
    }

    .toggle-button.is-active {
      border-color: var(--yellow);
      background: rgba(255, 224, 102, 0.16);
      color: var(--yellow);
      box-shadow:
        0 0 0 2px #000,
        4px 4px 0 rgba(255, 224, 102, 0.36),
        0 0 24px rgba(255, 224, 102, 0.18);
    }

    .step-strong {
      color: var(--yellow);
      font-weight: 700;
      font-size: 1.04rem;
    }

    .visual {
      min-height: 390px;
      border: 2px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 224, 102, 0.1), transparent 38%),
        linear-gradient(135deg, rgba(255, 63, 180, 0.2), transparent 52%),
        #0d1020;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.04),
        0 0 38px rgba(48, 242, 255, 0.15);
      position: relative;
      overflow: hidden;
    }

    .visual::before,
    .visual::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .visual::before {
      bottom: 0;
      width: 120%;
      height: 48%;
      background:
        linear-gradient(var(--line) 2px, transparent 2px),
        linear-gradient(90deg, var(--line) 2px, transparent 2px);
      background-size: 100% 30px, 42px 100%;
      transform: translateX(-50%) perspective(220px) rotateX(58deg);
      transform-origin: bottom;
    }

    .visual::after {
      top: 76px;
      width: 150px;
      height: 150px;
      background:
        linear-gradient(transparent 47%, rgba(9, 10, 18, 0.85) 48% 54%, transparent 55%),
        var(--yellow);
      box-shadow:
        0 0 42px rgba(255, 224, 102, 0.42),
        0 0 0 8px rgba(255, 224, 102, 0.08);
    }

    .bars {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 34px;
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 8px;
      align-items: end;
      height: 120px;
    }

    .bar {
      display: block;
      background: linear-gradient(var(--cyan), var(--pink));
      box-shadow: 0 0 18px rgba(255, 63, 180, 0.32);
    }

    .bar:nth-child(1) { height: 34%; }
    .bar:nth-child(2) { height: 72%; }
    .bar:nth-child(3) { height: 48%; }
    .bar:nth-child(4) { height: 86%; }
    .bar:nth-child(5) { height: 40%; }
    .bar:nth-child(6) { height: 64%; }
    .bar:nth-child(7) { height: 100%; }
    .bar:nth-child(8) { height: 58%; }
    .bar:nth-child(9) { height: 76%; }
    .bar:nth-child(10) { height: 44%; }
    .bar:nth-child(11) { height: 92%; }
    .bar:nth-child(12) { height: 52%; }
    .bar:nth-child(13) { height: 68%; }

    @media (max-width: 760px) {
      .page {
        place-items: start center;
        padding-top: 42px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 26px;
      }

      .hero-copy {
        padding: 0;
      }

      .visual {
        min-height: 270px;
      }

      .song-list {
        grid-template-columns: 1fr;
      }

      .actions {
        gap: 12px;
      }

      .start-button {
        min-width: 108px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-copy">
        <p class="eyebrow">8-bit sound lab</p>
        <h1 id="hero-title">SOUND WORKS</h1>
        <p class="description">
          レトロゲーム機の光と波形をモチーフにした、チップチューン制作のための小さなサウンドワークスペースです。
          シンプルな操作で、懐かしく鋭い電子音の世界を組み立てていきます。
        </p>
        <div class="actions">
          <button class="start-button" type="button" id="startButton">Start</button>
          <button class="start-button" type="button" id="playButton">Play</button>
          <button class="start-button toggle-button" type="button" id="loopButton">Loop Off</button>
          <div class="status-group">
            <span class="status" id="statusText" aria-live="polite"></span>
          </div>
        </div>
        <section class="song-panel" aria-labelledby="songPanelTitle">
          <h2 class="song-panel-title" id="songPanelTitle">Song List</h2>
          <p class="song-list-status" id="songListStatus">LOADING SONGS...</p>
          <p class="song-current" id="currentSongText">CURRENT: NONE</p>
          <p class="song-meta" id="currentSongMeta">BPM: -- | KEY: -- | ORIGIN: --</p>
          <ul class="song-list" id="songList"></ul>
        </section>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="bars">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const startButton = document.querySelector("#startButton");
    const playButton = document.querySelector("#playButton");
    const loopButton = document.querySelector("#loopButton");
    const statusText = document.querySelector("#statusText");
    const songList = document.querySelector("#songList");
    const songListStatus = document.querySelector("#songListStatus");
    const currentSongText = document.querySelector("#currentSongText");
    const currentSongMeta = document.querySelector("#currentSongMeta");
    const BPM = 120;
    const TOTAL_STEPS = 16;
    const GATE_TIME = 0.85;
    const songFiles = [
      "amazing-grace.json",
      "auld-lang-syne.json",
      "frere-jacques.json",
      "greensleeves.json",
      "london-bridge.json",
      "mary-had-a-little-lamb.json",
      "ode-to-joy.json",
      "row-row-row-your-boat.json",
      "scarborough-fair.json",
      "twinkle-twinkle-little-star.json"
    ];
    let audioContext = null;
    let currentStep = -1;
    let playbackTimerId = null;
    let selectedSongFile = null;
    let currentSong = null;
    let isPlaying = false;
    let loopEnabled = false;

    function getStepLabel() {
      return currentStep >= 0 ? String(currentStep + 1).padStart(2, "0") : "--";
    }

    function updateStatus() {
      const audioState = audioContext ? audioContext.state.toUpperCase() : "OFF";
      const playState = isPlaying ? "PLAYING" : "IDLE";
      const loopState = loopEnabled ? "LOOP ON" : "LOOP OFF";

      statusText.innerHTML =
        `AUDIO: ${audioState} | ${playState} | ${loopState} | STEP <span class="step-strong">${getStepLabel()}</span>/${TOTAL_STEPS}`;
      playButton.textContent = isPlaying ? "Stop" : "Play";
      playButton.disabled = !currentSong;
      loopButton.textContent = loopEnabled ? "Loop On" : "Loop Off";
      loopButton.classList.toggle("is-active", loopEnabled);
    }

    function updateCurrentSongDisplay() {
      currentSongText.textContent = currentSong
        ? `CURRENT: ${currentSong.title}`
        : "CURRENT: NONE";

      currentSongMeta.textContent = currentSong
        ? `BPM ${currentSong.bpm} | KEY ${currentSong.key} | ${currentSong.origin}`
        : "BPM: -- | KEY: -- | ORIGIN: --";
    }

    function stopPlayback() {
      if (playbackTimerId) {
        window.clearTimeout(playbackTimerId);
        playbackTimerId = null;
      }

      if (isPlaying) {
        console.debug("Playback stopped");
      }
      isPlaying = false;
      currentStep = -1;
      updateStatus();
    }

    function playTestTone() {
      if (!audioContext || audioContext.state !== "running") {
        return;
      }

      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(440, now);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.linearRampToValueAtTime(0.08, now + 0.01);
      gainNode.gain.linearRampToValueAtTime(0.0001, now + 0.2);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start(now);
      oscillator.stop(now + 0.2);
    }

    function noteToFrequency(note) {
      if (!note || note === "REST") {
        return null;
      }

      const match = /^([A-G])(#?)(-?\d+)$/.exec(note);

      if (!match) {
        return null;
      }

      const semitoneMap = {
        C: 0,
        D: 2,
        E: 4,
        F: 5,
        G: 7,
        A: 9,
        B: 11
      };
      const [, pitch, sharp, octaveText] = match;
      const octave = Number(octaveText);
      const midiNote = (octave + 1) * 12 + semitoneMap[pitch] + (sharp ? 1 : 0);

      return 440 * (2 ** ((midiNote - 69) / 12));
    }

    // Short chip-style note with a gated tail so adjacent steps do not blur together.
    function playSquareTone(frequency, duration = 0.2) {
      if (!audioContext || audioContext.state !== "running" || !frequency) {
        return;
      }

      const now = audioContext.currentTime;
      const gatedDuration = Math.max(0.04, duration * GATE_TIME);
      const attackTime = Math.min(0.008, gatedDuration * 0.2);
      const decayEnd = now + Math.min(0.04, gatedDuration * 0.45);
      const releaseStart = Math.max(decayEnd, now + gatedDuration - 0.03);
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(frequency, now);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.linearRampToValueAtTime(0.08, now + attackTime);
      gainNode.gain.linearRampToValueAtTime(0.055, decayEnd);
      gainNode.gain.setValueAtTime(0.055, releaseStart);
      gainNode.gain.linearRampToValueAtTime(0.0001, now + gatedDuration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start(now);
      oscillator.stop(now + gatedDuration);
    }

    function playSongStep(stepIndex, stepDurationMs) {
      if (!currentSong || stepIndex >= currentSong.steps.length) {
        stopPlayback();
        return;
      }

      currentStep = stepIndex;
      updateStatus();

      const note = currentSong.steps[stepIndex];
      const frequency = noteToFrequency(note);

      if (frequency) {
        playSquareTone(frequency, Math.max(0.08, (stepDurationMs / 1000) * 0.9));
      }

      if (stepIndex < currentSong.steps.length - 1) {
        playbackTimerId = window.setTimeout(() => {
          playSongStep(stepIndex + 1, stepDurationMs);
        }, stepDurationMs);
        return;
      }

      playbackTimerId = window.setTimeout(() => {
        if (loopEnabled) {
          console.debug("Playback loop restart");
          playSongStep(0, stepDurationMs);
          return;
        }

        console.debug("Playback finished");
        stopPlayback();
      }, stepDurationMs);
    }

    function startPlayback() {
      if (!currentSong || isPlaying) {
        return;
      }

      const stepDurationMs = (60 / currentSong.bpm / 4) * 1000;

      stopPlayback();
      isPlaying = true;
      updateStatus();
      playSongStep(0, stepDurationMs);
    }

    function renderSongList(songs) {
      songList.replaceChildren();

      songs.forEach((song) => {
        const item = document.createElement("li");
        const button = document.createElement("button");
        const title = document.createElement("span");
        const bpm = document.createElement("span");

        button.type = "button";
        button.className = "song-item-button";
        button.dataset.songFile = song.file;
        title.className = "song-item-title";
        title.textContent = song.title;
        bpm.className = "song-item-bpm";
        bpm.textContent = `${song.bpm} BPM`;

        if (song.file === selectedSongFile) {
          button.classList.add("is-selected");
        }

        button.addEventListener("click", () => {
          selectedSongFile = song.file;
          currentSong = song;
          console.log("currentSong", currentSong);
          updateCurrentSongDisplay();

          songList.querySelectorAll(".song-item-button").forEach((element) => {
            element.classList.toggle("is-selected", element.dataset.songFile === selectedSongFile);
          });
        });

        button.append(title, bpm);
        item.appendChild(button);
        songList.appendChild(item);
      });
    }

    async function loadSongs() {
      try {
        const songs = await Promise.all(
          songFiles.map(async (file) => {
            const response = await fetch(`songs/${file}`);

            if (!response.ok) {
              throw new Error(`Failed to load ${file}`);
            }

            const song = await response.json();
            return { ...song, file };
          })
        );

        songListStatus.textContent = "SELECT A SONG";
        renderSongList(songs);
      } catch (error) {
        console.error("Song loading failed", error);
        songListStatus.textContent = "SONGS COULD NOT BE LOADED";
      }
    }

    startButton.addEventListener("click", async () => {
      startButton.classList.add("is-pressed");

      try {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          audioContext = new AudioContextClass();
          audioContext.addEventListener("statechange", updateStatus);
        }

        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        if (currentSong && currentSong.steps.length > 0) {
          playSquareTone(noteToFrequency(currentSong.steps[0]));
        } else {
          playTestTone();
        }

        updateStatus();
      } catch (error) {
        console.error("Start action failed", error);
        statusText.textContent = "AUDIO ERROR: START FAILED";
      }

      window.setTimeout(() => {
        startButton.classList.remove("is-pressed");
      }, 160);
    });

    playButton.addEventListener("click", async () => {
      playButton.classList.add("is-pressed");

      try {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          audioContext = new AudioContextClass();
          audioContext.addEventListener("statechange", updateStatus);
        }

        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        if (isPlaying) {
          stopPlayback();
        } else {
          startPlayback();
        }

        updateStatus();
      } catch (error) {
        console.error("Playback action failed", error);
        statusText.textContent = "AUDIO ERROR: PLAYBACK FAILED";
      }

      window.setTimeout(() => {
        playButton.classList.remove("is-pressed");
      }, 160);
    });

    loopButton.addEventListener("click", () => {
      loopButton.classList.add("is-pressed");
      loopEnabled = !loopEnabled;
      updateStatus();

      window.setTimeout(() => {
        loopButton.classList.remove("is-pressed");
      }, 160);
    });

    updateStatus();
    updateCurrentSongDisplay();
    loadSongs();
  </script>
</body>
</html>
